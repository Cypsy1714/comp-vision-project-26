# shared
image_size: 224        # imagenet default (216 optional)
num_classes: 20
seed: 1337
device: auto

# step order — add/remove/reorder
pipeline: [detector, views, cnn, meta]

paths:
  input: input
  crops: input/views_test
  views: output/views
  scores: output/scores
  preds: output/predictions

# part 1 — A
detector:
  weights: yolo11l.pt
  conf: 0.25
  reject_on_no_animal: true   # toggle

# part 2 — B
views:
  active: [clean, hflip, blur, gray, sobel, more_blur, most_blur, perspective, wave, pop_art, strong_pop_art, picasso, triangle_sudoku, random_sudoku_region, cartoon, extra_perspective, sudoku, solarize, solarize_light, solarize_dark, posterize, equalize, color_jitter, comic_clean, inception_fold, hide_and_seek, random_value_fill, warhol_random_fill, random_shape_occluder, grid_dropout, art_nouveau, bauhaus, spatter, superman_laser_eyes, frost, affine_translate, affine_scale, sudoku_quarter_mix, complementary_colors, opposite_colors, opposite_complementary_shuffle, red_green_duotone, red_green_grid, red_green_grid_mirror_red_restore, mirror_wave, anime, advanced_anime, random_thick_line, random_yellow_frame, drunk, blackout, elastic_transform, center_shrink_fill_fragments, center_shrink_bauhaus_fill, center_bauhaus_fragments_fill, split_overlay_gradient_bg, wrap_roll, gaussian_noise, upside_down, upside_noise_wave, multiplicative_noise, neighbor_majority_20000, neighbor_majority_25000_sudoku, color_quantization, snow, rain_streaks, horizontal_stretch]   # K = length of this list

# part 3 — C
cnn:
  backbone: efficientnet_b0
  pretrained: true
  head: {epochs: 5, lr: 0.001}
  full: {epochs: 30, lr: 0.0001}
  batch_size: 32

# part 4 — D
meta:
  reject_enabled: true        # toggle
  threshold: 0.5
  hidden: [256, 128]
