# shared
image_size: 224        # imagenet default (216 optional)
num_classes: 20
seed: 1337
device: auto

# step order — add/remove/reorder
pipeline: [detector, views, cnn, meta]

paths:
  input: input/images
  crops: output/crops
  views: output/views
  scores: output/scores
  preds: output/predictions

# part 1 — A
detector:
  weights: yolo11l.pt
  conf: 0.25
  reject_on_no_animal: true   # true = no animal -> reject (-1), no crop; false = full image becomes the crop. training always keeps the full-image crop
  output_size: 224            # every saved crop is forced to this square size
  resize_mode: fit            # "fit" = keep aspect + transparent padding, "stretch" = distort to fill

# part 2 — B
views:
  active: [clean, hflip, blur, gray, sobel,wave, strong_pop_art,triangle_sudoku, random_sudoku_region, sudoku, solarize, posterize, equalize, color_jitter, hide_and_seek, random_value_fill, warhol_random_fill, random_shape_occluder, grid_dropout, art_nouveau, bauhaus]   # K = length of this list
  regenerate: []              # random views remade before every training epoch (fresh corruption); [] = off, only makes sense with cnn.train_on: views

# part 3 — C
cnn:
  labels: input/images/labels.csv
  checkpoints: output/models
  train_on: views             # crops | views
  val_split: 0.2
  batch_size: 32
  label_smoothing: 0.1
  weighted_loss: false        # inverse-frequency class weights in the loss
  warmup_epochs: 1
  weight_decay: 0.0001
  score_layout: stacked       # stacked -> (M*K, C) | 3d -> (M, K, C)
  models:                     # 1 entry = single model, 2 = side by side
    - name: imagenet
      type: timm              # timm | custom
      backbone: efficientnet_b0
      pretrained: true
      head: {epochs: 3, lr: 0.001}    # base frozen, head only
      full: {epochs: 5, lr: 0.0001}  # everything trains (0 = keep base locked)
    - name: scratch
      type: custom
      channels: [32, 64, 128] # conv block sizes
      hidden: [256]           # dense layer sizes before the output
      head: {epochs: 0, lr: 0.001}
      full: {epochs: 10, lr: 0.001}

# part 4 — D
meta:
  reject_enabled: true        # toggle
  threshold: 0.5
  hidden: [256, 128]
