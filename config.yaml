# shared
image_size: 224        # imagenet default (216 optional)
num_classes: 20
seed: 1337
device: auto

# step order — add/remove/reorder
pipeline: [detector, views, cnn, meta]

paths:
  input: input
  crops: input/views_test
  views: output/views
  scores: output/scores
  preds: output/predictions

# part 1 — A
detector:
  weights: yolo11l.pt
  conf: 0.25
  reject_on_no_animal: true   # toggle
  output_size: 224            # every saved crop is forced to this square size
  resize_mode: fit            # "fit" = keep aspect + transparent padding, "stretch" = distort to fill

# part 2 — B
views:
  active: [clean, hflip, blur, gray, sobel, perspective, wave, pop_art, strong_pop_art, triangle_sudoku, random_sudoku_region, sudoku, solarize_light, solarize_dark, color_jitter, comic_clean, hide_and_seek, random_value_fill, warhol_random_fill, random_shape_occluder, grid_dropout, art_nouveau, bauhaus, spatter, frost, affine_translate, affine_scale, sudoku_quarter_mix, complementary_colors, opposite_colors, opposite_complementary_shuffle, red_green_duotone, red_green_grid, red_green_grid_mirror_red_restore, mirror_wave, random_thick_line, random_yellow_frame, drunk, center_shrink_fill_fragments, center_shrink_bauhaus_fill, center_bauhaus_fragments_fill, split_overlay_gradient_bg, gaussian_noise, upside_down, upside_noise_wave, neighbor_majority_20000, neighbor_majority_25000_sudoku, snow, rain_streaks, horizontal_stretch, mosaic_4_tile, mosaic_4_random_effects, cross_hatching, classic_disney, fenerbahce, white_concrete_da_vinci, approx_living_fenerbahce_da_vinci_upside_down, circular_ripple, smiley_overlay, golden_edges, outer_edges_random_value_fill, outer_edges_random_value_fill_wave_zoom, orange_noir_expansion, transparent_checker_grid_pieces, shape_cutout_blur_background, cutout_orange_noir_background, random_piece_swap, double_piece_swap_purple_spatter, vivid_cubist, vivid_cubist_random_fill_frost_bauhaus]   # K = length of this list

# part 3 — C
cnn:
  backbone: efficientnet_b0
  pretrained: true
  head: {epochs: 5, lr: 0.001}
  full: {epochs: 30, lr: 0.0001}
  batch_size: 32

# part 4 — D
meta:
  reject_enabled: true        # toggle
  threshold: 0.5
  hidden: [256, 128]
